name: Deploy to Azure App Service

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish src/AuntiesRecipe.Web/AuntiesRecipe.Web.csproj \
            -c Release \
            -o ${{ github.workspace }}/publish

      - name: Deploy (publish profile)
        uses: azure/webapps-deploy@v3
        with:
          app-name: AuntiesRecipe-Project
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish

