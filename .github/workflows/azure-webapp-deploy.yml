name: Deploy to Azure App Service

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets presence (debug)
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          python - <<'PY'
          import os
          pp = os.environ.get("AZURE_WEBAPP_PUBLISH_PROFILE","")
          name = os.environ.get("AZURE_WEBAPP_NAME","")
          if not name.strip():
              raise SystemExit("AZURE_WEBAPP_NAME secret is empty/missing.")
          if not pp.strip():
              raise SystemExit("AZURE_WEBAPP_PUBLISH_PROFILE secret is empty/missing.")

          # Safe diagnostics only (no secret content).
          print("AZURE_WEBAPP_NAME OK")
          print("publish-profile length:", len(pp))
          print("contains <publishProfile>:", "<publishProfile" in pp)
          PY

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish src/AuntiesRecipe.Web/AuntiesRecipe.Web.csproj \
            -c Release \
            -o ${{ github.workspace }}/publish

      - name: Deploy (publish profile)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish

