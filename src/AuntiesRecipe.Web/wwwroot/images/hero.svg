  </defs>

  <rect width="1600" height="600" fill="url(#g)"/>

  <circle cx="340" cy="180" r="140" fill="#22c55e" opacity="0.35" filter="url(#blur)"/>
  <circle cx="1180" cy="140" r="170" fill="#fb923c" opacity="0.30" filter="url(#blur)"/>
  <circle cx="980" cy="460" r="220" fill="#14b8a6" opacity="0.25" filter="url(#blur)"/>

  <rect x="0" y="0" width="1600" height="600" fill="#000" opacity="0.15"/>

  <text x="90" y="300" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">
    Las Flores Juice
  </text>
  <text x="92" y="380" fill="#e6fffb" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="500" opacity="0.95">
